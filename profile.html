<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân | EDU BOURBON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="profile-body">
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">EDU<span class="text-blue">BOURBON</span></a>
            <a href="index.html" class="btn btn-outline" style="display: flex; align-items: center; gap: 8px;">
                <span>←</span> Quay lại trang chủ
            </a>
        </div>
    </nav>

    <main class="profile-container container">
        <div class="profile-card glass-card">
            <!-- Left Section: Overview -->
            <div class="profile-overview">
                <div class="avatar-edit-wrapper">
                    <img id="profileAvatar" src="" alt="Avatar" class="profile-avatar-large" style="display: none;">
                    <div id="profileAvatarPlaceholder" class="profile-avatar-large-placeholder">U</div>
                </div>
                <h2 id="profileDisplayName">User Name</h2>
                <span class="user-email-badge" id="profileEmailBadge">user@example.com</span>
                
                <div class="user-meta-info">
                    <div class="meta-item">
                        <span>UID tài khoản:</span>
                        <strong id="profileUid">...</strong>
                    </div>
                    <div class="meta-item">
                        <span>Nhà cung cấp:</span>
                        <strong id="profileProvider" style="text-transform: uppercase;">Password</strong>
                    </div>
                </div>

                <button class="btn btn-logout" id="profileLogoutBtn" style="width: 100%; margin-top: 30px;">Đăng Xuất</button>
            </div>

            <!-- Right Section: Edit Fields -->
            <div class="profile-edit-fields">
                <h3>Chỉnh Sửa Thông Tin</h3>
                <p style="color: var(--text-light); font-size: 14px; margin-bottom: 24px;">Cập nhật thông tin tài khoản của bạn tại đây.</p>
                
                <form id="profileEditForm">
                    <div class="input-group-profile">
                        <label for="editName">Họ và tên</label>
                        <input type="text" id="editName" class="input-glass" required>
                    </div>
                    
                    <div class="input-group-profile">
                        <label for="editEmail">Địa chỉ Email (Không thể thay đổi)</label>
                        <input type="email" id="editEmail" class="input-glass" disabled>
                    </div>

                    <div class="input-group-profile">
                        <label for="editPhotoUrl">Ảnh đại diện (URL liên kết)</label>
                        <input type="url" id="editPhotoUrl" class="input-glass" placeholder="Nhập liên kết hình ảnh trực tuyến (https://...)">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; margin-top: 20px;">Lưu Thay Đổi</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="profile.js"></script>
</body>
</html>
